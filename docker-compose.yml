version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: btcpipeline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env
